<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Movers</title>
<link rel="stylesheet" href="muscles-west.css">
<style>
  .unit-tag.back      { background: #b85c4a }
  .unit-tag.hip       { background: #7a5c9e }
  .unit-tag.wrist     { background: #4a7c8a }
  .unit-tag.ankle     { background: #4a8a5c }
  .unit-tag.foot      { background: #7a8a4a }
  .unit-tag.landmarks { background: #c9a84c; color: #1a1f2e }
  .filt.hip           { }
  .filt.active.hip    { background: #7a5c9e; border-color: #7a5c9e }
  .filt.active.wrist  { background: #4a7c8a; border-color: #4a7c8a }
  .filt.active.ankle  { background: #4a8a5c; border-color: #4a8a5c }
  .filt.active.foot   { background: #7a8a4a; border-color: #7a8a4a }
  .filt.active.lm     { background: #c9a84c; border-color: #c9a84c; color: #1a1f2e }
  .ans-lbl.f1         { color: #b85c4a }
  .ans-lbl.f2         { color: #4a7c8a }
  .movement-name { font-size: clamp(1.1rem,2.5vw,1.5rem); font-weight: 700; color: #1a1f2e; line-height: 1.3; margin-bottom: 8px }
</style>
</head>
<body>
<header>
  <div class="eyebrow">Kinesiology</div>
  <h1>Prime <em>Movers</em></h1>
  <p>Agonists · Antagonists · Bony Landmarks — tap a card to reveal</p>
</header>
<div class="filters" id="filters">
  <button class="filt active" data-unit="all">All (35)</button>
  <button class="filt" data-unit="BACK">Back (6)</button>
  <button class="filt hip" data-unit="HIP">Hip (6)</button>
  <button class="filt wrist" data-unit="WRIST">Wrist (4)</button>
  <button class="filt ankle" data-unit="ANKLE">Ankle (2)</button>
  <button class="filt foot" data-unit="FOOT">Foot (2)</button>
  <button class="filt lm" data-unit="LANDMARKS">Bony Landmarks (15)</button>
</div>
<div class="modes" id="modes">
  <button class="mode active" data-mode="all">Full Card</button>
  <button class="mode" data-mode="f1" id="mode-f1">Quiz: Agonist</button>
  <button class="mode" data-mode="f2" id="mode-f2">Quiz: Antagonist</button>
</div>
<div class="options-row">
  <label class="toggle" id="flip-label">
    <input type="checkbox" id="flip-toggle">
    Start cards flipped (answer side up)
  </label>
</div>
<div class="prog">
  <div class="prog-info"><span id="prog-text">Loading...</span><span id="prog-pct"></span></div>
  <div class="bar"><div class="fill" id="prog-fill" style="width:0%"></div></div>
</div>
<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face front">
      <div class="front-top">
        <span class="unit-tag" id="f-unit"></span>
        <span class="page-ref" id="f-type"></span>
      </div>
      <div>
        <div class="muscle-name" id="f-name"></div>
        <div class="ask-lbl" id="f-ask-lbl">What is the:</div>
        <div class="asking" id="f-asking"></div>
      </div>
      <div class="hint">tap to reveal answer</div>
    </div>
    <div class="face back">
      <div class="back-name" id="b-name"></div>
      <div id="b-content"></div>
    </div>
  </div>
</div>
<div class="controls">
  <button class="btn btn-s" id="prev-btn" onclick="prev()">&#8592; Prev</button>
  <button class="btn btn-p" id="next-btn" onclick="next()">Next &#8594;</button>
  <button class="btn btn-s" onclick="shuffle()">Shuffle</button>
</div>
<div class="stats">
  <div class="stat"><div class="sn" id="s-seen">0</div><div class="sl">Seen</div></div>
  <div class="stat"><div class="sn" id="s-total">-</div><div class="sl">Total</div></div>
  <div class="stat"><div class="sn" id="s-left">-</div><div class="sl">Left</div></div>
</div>
<script src="prime-movers.js"></script>
</body>
</html>
